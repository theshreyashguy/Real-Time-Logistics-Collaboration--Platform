services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: hemut
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d hemut"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional: run the backend in a container too. For local dev you can also
  # run it on the host with `uvicorn app.main:app --reload`.
  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@db:5432/hemut
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-only-change-me
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    profiles: ["full"]   # only starts with: docker compose --profile full up

volumes:
  pgdata:
